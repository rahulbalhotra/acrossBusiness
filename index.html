<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Image Page</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .image-box {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 0;
    }

    .image-box img {
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
      object-position: center center;
      transform: translateZ(0);
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      color: #fff;
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="image-box">
    <!-- Background image with centered text area; object-fit cover crops edges, centers content -->
    <img src="pictures/bg.png" alt="Background image" />
  </div>

</body>
</html>
